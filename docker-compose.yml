services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_DAYS: "7"
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://${DEV_MACHINE_IP:-localhost}:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
